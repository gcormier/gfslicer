name: Deploy web/ to GitHub Pages

# The client is a no-build static site (web/), so this just uploads that folder
# as the Pages artifact. Deploys on push to the default branch; can also be run
# manually from the Actions tab.
on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
